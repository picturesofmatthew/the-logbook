<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>signed × sealed — offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #2b2620;
        color: #f5eddc;
        font-family: Georgia, "Times New Roman", serif;
        text-align: center;
        padding: 2rem;
      }
      .card {
        max-width: 22rem;
        border: 2px solid #6b5d4a;
        border-radius: 14px;
        padding: 2rem 1.6rem;
        background: #352f27;
      }
      .lantern {
        font-size: 2.2rem;
        margin-bottom: 0.8rem;
      }
      h1 {
        font-size: 1.1rem;
        letter-spacing: 0.06em;
        margin: 0 0 0.6rem;
        color: #e7d9b8;
      }
      p {
        font-size: 0.95rem;
        line-height: 1.5;
        margin: 0;
        color: #cdbfa3;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="lantern">🏮</div>
      <h1>the glade is out of reach</h1>
      <p>
        The ink needs a connection to land. The fox will keep the lantern lit —
        nothing you logged is lost. Come back when the signal returns.
      </p>
    </div>
  </body>
</html>
